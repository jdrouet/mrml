name: mrml-python release

on:
  workflow_call:
    inputs:
      release_tag:
        description: "Release tag to use"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to use"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - platform: x86_64
            manylinux: "auto"
          - platform: x86
            manylinux: "auto"
          - platform: aarch64
            manylinux: "2_28"
          - platform: armv7
            manylinux: "auto"
          - platform: s390x
            manylinux: "auto"
          - platform: ppc64le
            manylinux: "auto"
    steps:
      - uses: actions/checkout@v6
      - name: build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target.platform }}
          args: --release --out dist --find-interpreter
          sccache: "true"
          manylinux: ${{ matrix.target.manylinux }}
          working-directory: packages/mrml-python

      - name: display directory content
        run: ls -lha packages/mrml-python/dist/*

      - name: upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target.platform }}
          path: packages/mrml-python/dist
          overwrite: true

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64, x86]
    steps:
      - uses: actions/checkout@v6
      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          architecture: ${{ matrix.target }}
      - name: build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: "true"
          working-directory: packages/mrml-python
      - name: upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.target }}
          path: packages/mrml-python/dist
          overwrite: true

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v6
      - name: setup python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          sccache: "true"
          working-directory: packages/mrml-python
      - name: upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target }}
          path: packages/mrml-python/dist
          overwrite: true

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: packages/mrml-python
      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: wheels-sdist
          path: packages/mrml-python/dist
          overwrite: true

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [linux, windows, macos, sdist]
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: wheels-linux-x86_64
          path: packages/mrml-python/dist
      - uses: actions/download-artifact@v8
        with:
          name: wheels-linux-x86
          path: packages/mrml-python/dist
      - uses: actions/download-artifact@v8
        with:
          name: wheels-linux-aarch64
          path: packages/mrml-python/dist
      - uses: actions/download-artifact@v8
        with:
          name: wheels-linux-armv7
          path: packages/mrml-python/dist
      - uses: actions/download-artifact@v8
        with:
          name: wheels-linux-s390x
          path: packages/mrml-python/dist
      - uses: actions/download-artifact@v8
        with:
          name: wheels-linux-ppc64le
          path: packages/mrml-python/dist

      - uses: actions/download-artifact@v8
        with:
          name: wheels-windows-x64
          path: packages/mrml-python/dist
      - uses: actions/download-artifact@v8
        with:
          name: wheels-windows-x86
          path: packages/mrml-python/dist

      - uses: actions/download-artifact@v8
        with:
          name: wheels-macos-x86_64
          path: packages/mrml-python/dist
      - uses: actions/download-artifact@v8
        with:
          name: wheels-macos-aarch64
          path: packages/mrml-python/dist

      - uses: actions/download-artifact@v8
        with:
          name: wheels-sdist
          path: packages/mrml-python/dist

      - name: publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/mrml-python/dist/
          skip-existing: true

  notify:
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: notify mastodon
        uses: cbrgm/mastodon-github-action@v2
        with:
          access-token: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          language: "en" # ISO 639 language code for the toot.
          message: |
            👋 Hey! I just released a new version of mrml-python! 🐍
            https://github.com/jdrouet/mrml/releases/tag/${{ inputs.release_tag }} and https://pypi.org/project/mrml/
          url: ${{ secrets.MASTODON_URL }}
          visibility: "public"
        continue-on-error: true
